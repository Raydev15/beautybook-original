<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento — BeautyBook</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">💅 Beauty<span>Book</span></a>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="agendamento.html">Agendar</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-hero">
        <h1>Fazer <span>Agendamento</span></h1>
        <p>Preencha o formulário abaixo para simular um agendamento.</p>
    </div>

    <section>
        <div class="container">
            <div class="form-agendamento">
                <h2 style="font-size: 20px; color: #3d2b1f; margin-bottom: 25px; text-align: center;">Dados do Agendamento</h2>

                <div class="form-grupo">
                    <label>Nome completo</label>
                    <input type="text" placeholder="Digite seu nome">
                </div>

                <div class="form-grupo">
                    <label>Telefone / WhatsApp</label>
                    <input type="tel" placeholder="(11) 99999-9999">
                </div>

                <div class="form-grupo">
                    <label>Serviço desejado</label>
                    <select>
                        <option value="">Selecione um serviço</option>
                        <option>Corte Feminino — R$ 60</option>
                        <option>Coloração — R$ 120</option>
                        <option>Manicure — R$ 35</option>
                        <option>Pedicure — R$ 40</option>
                        <option>Design de Sobrancelha — R$ 25</option>
                        <option>Henna — R$ 35</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label>Data preferida</label>
                    <input type="date">
                </div>

                <div class="form-grupo">
                    <label>Horário preferido</label>
                    <select>
                        <option value="">Selecione um horário</option>
                        <option>09:00</option>
                        <option>10:00</option>
                        <option>11:00</option>
                        <option>14:00</option>
                        <option>15:00</option>
                        <option>16:00</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label>Observações</label>
                    <textarea placeholder="Alguma informação adicional?"></textarea>
                </div>

                <div class="centralizado">
                    <a href="index.html" class="btn btn-primario">Confirmar Agendamento</a>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-logo">Beauty<span>Book</span></div>
        <div class="footer-links">
            <a href="index.html">Início</a>
            <a href="servicos.html">Serviços</a>
            <a href="agendamento.html">Agendar</a>
        </div>
        <p class="footer-copy">© 2026 BeautyBook — Projeto ADS 1º Semestre.</p>
    </footer>

</body>
</html>
